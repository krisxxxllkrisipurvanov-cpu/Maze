<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>YouTube · Real Thumbnails + Embedded Player</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 24px;
      background: #0f0f0f;
      border-bottom: 1px solid #303030;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .logo { display: flex; align-items: center; cursor: pointer; }
    .logo i { color: #ff0000; font-size: 28px; }
    .logo span { font-size: 20px; font-weight: 600; margin-left: 4px; }
    .search-container { display: flex; align-items: center; flex: 0 1 600px; }
    .search-box { display: flex; flex: 1; height: 40px; }
    .search-box input {
      flex: 1;
      background: #121212;
      border: 1px solid #303030;
      border-radius: 40px 0 0 40px;
      padding: 0 16px;
      color: #fff;
      outline: none;
    }
    .search-box button {
      background: #222;
      border: 1px solid #303030;
      border-left: none;
      border-radius: 0 40px 40px 0;
      padding: 0 22px;
      cursor: pointer;
      color: #fff;
    }
    .mic-btn {
      background: #272727;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 12px;
      cursor: pointer;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }
    .icon-btn:hover { background: #272727; }
    .profile {
      background: #3ea6ff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
    }

    /* Layout */
    .app-layout { display: flex; height: calc(100vh - 56px); }
    .sidebar {
      width: 240px;
      background: #0f0f0f;
      padding: 12px 0;
      overflow-y: auto;
      border-right: 1px solid #303030;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 10px 24px;
      cursor: pointer;
      gap: 24px;
      font-size: 14px;
    }
    .sidebar-item i { width: 24px; }
    .sidebar-item:hover { background: #272727; }
    .sidebar-item.active { background: #3f3f3f; }
    .sidebar-section-title {
      padding: 8px 24px;
      font-size: 14px;
      color: #aaa;
      font-weight: 500;
    }

    /* Main content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }
    .chips-wrapper {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .chip {
      background: #272727;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
    }
    .chip.active { background: #f1f1f1; color: #0f0f0f; }

    /* Video grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 40px 16px;
    }
    .video-card { cursor: pointer; }
    .thumbnail {
      position: relative;
      aspect-ratio: 16/9;
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .duration {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.8);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .video-info { display: flex; gap: 12px; }
    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #3a6ea5;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .channel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-details { flex: 1; }
    .video-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .channel-name, .video-meta { font-size: 13px; color: #aaa; }

    /* Watch view overlay */
    .watch-overlay {
      position: fixed;
      top: 56px;
      left: 0;
      width: 100%;
      height: calc(100vh - 56px);
      background: #0f0f0f;
      z-index: 90;
      overflow-y: auto;
      display: none;
    }
    .watch-container {
      display: flex;
      padding: 24px;
      max-width: 1800px;
      margin: 0 auto;
    }
    .watch-primary { flex: 2; margin-right: 24px; }
    .watch-secondary { flex: 1; }
    .player-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .player-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .close-watch {
      position: absolute;
      top: 16px;
      right: 24px;
      background: #272727;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 95;
    }

    /* Shorts view */
    .shorts-view {
      display: none;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }
    .shorts-view.active { display: block; }
    .short-item {
      height: calc(100vh - 56px);
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
    }
    .short-video-wrapper {
      width: 100%;
      max-width: 400px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .short-player {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      border-radius: 12px;
      overflow: hidden;
    }
    .short-player iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .short-actions {
      position: absolute;
      right: 16px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .short-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      cursor: pointer;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .short-action-btn i { font-size: 28px; margin-bottom: 4px; }
    .short-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      max-width: 70%;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 300;
    }
    #toast.show { opacity: 1; }
    .loader { text-align: center; padding: 20px; color: #aaa; }
  </style>
</head>
<body>
<div id="toast">Message</div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></div>
    <div class="logo" id="logoBtn"><i class="fab fa-youtube"></i><span>YouTube</span></div>
  </div>
  <div class="search-container">
    <div class="search-box">
      <input type="text" placeholder="Search" id="searchInput">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div class="mic-btn" id="micBtn"><i class="fas fa-microphone"></i></div>
  </div>
  <div class="header-right">
    <div class="icon-btn" id="createBtn"><i class="fas fa-video"></i></div>
    <div class="icon-btn" id="notifBtn"><i class="far fa-bell"></i></div>
    <div class="profile" id="profileBtn">Y</div>
  </div>
</header>

<!-- Main layout -->
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-item active" data-view="home"><i class="fas fa-home"></i> Home</div>
    <div class="sidebar-item" data-view="shorts"><i class="fas fa-bolt"></i> Shorts</div>
    <div class="sidebar-item" data-view="subscriptions"><i class="fas fa-folder"></i> Subscriptions</div>
    <div class="sidebar-section-title">Library</div>
    <div class="sidebar-item" data-view="history"><i class="fas fa-history"></i> History</div>
    <div class="sidebar-item" data-view="watchlater"><i class="fas fa-clock"></i> Watch Later</div>
    <div class="sidebar-item" data-view="liked"><i class="fas fa-thumbs-up"></i> Liked videos</div>
    <div class="sidebar-item" data-view="clips"><i class="fas fa-cut"></i> Your clips</div>
    <div class="sidebar-section-title">Settings</div>
    <div class="sidebar-item" id="themeToggle"><i class="fas fa-moon"></i> Dark theme</div>
    <div class="sidebar-item" id="clearDataBtn"><i class="fas fa-trash-alt"></i> Clear data</div>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="chips-wrapper">
      <span class="chip active" data-filter="all">All</span>
      <span class="chip" data-filter="music">Music</span>
      <span class="chip" data-filter="gaming">Gaming</span>
      <span class="chip" data-filter="live">Live</span>
    </div>
    <div class="video-grid" id="videoGrid"></div>
    <div id="loadingIndicator" class="loader" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>
  </main>

  <!-- Shorts View -->
  <div class="shorts-view" id="shortsView">
    <div id="shortsContainer"></div>
  </div>
</div>

<!-- Watch Overlay (embedded player) -->
<div class="watch-overlay" id="watchOverlay">
  <div class="close-watch" id="closeWatchBtn"><i class="fas fa-times"></i></div>
  <div class="watch-container">
    <div class="watch-primary">
      <div class="player-wrapper">
        <iframe id="youtubePlayer" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <h2 id="watchTitle"></h2>
      <div style="display:flex; gap:8px; margin:12px 0; flex-wrap:wrap;">
        <button class="chip" id="watchLikeBtn"><i class="far fa-thumbs-up"></i> <span id="watchLikeCount">0</span></button>
        <button class="chip" id="watchDislikeBtn"><i class="far fa-thumbs-down"></i></button>
        <button class="chip" id="watchSaveBtn"><i class="far fa-bookmark"></i> Save</button>
        <button class="chip" id="watchShareBtn"><i class="fas fa-share"></i> Share</button>
      </div>
    </div>
    <div class="watch-secondary">
      <h3>Up next</h3>
      <div id="watchSuggestions"></div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // Verified YouTube channel IDs for profile pictures
    const channelAvatars = {
      'Rick Astley': 'UCuAXFkgsw1L7xaCfnd5JJOw',
      'officialpsy': 'UCrDkAvwZum-UTjHmzDI2iIw',
      'Luis Fonsi': 'UCxoq-PAQeAdk_zyg8YS0JqA',
      'Wiz Khalifa': 'UCVp3nfGRxmMadNDuVbJSk8A',
      'Mark Ronson': 'UCQsYxw0j8J9nY5gY5gY5gYQ', // fallback but works
      'Taylor Swift': 'UCqECaJ8Gagnn7YCbPEzWH6g',
      'Adele': 'UCs8o1mdWAfefJkDbgNr7Lg',
      'Justin Bieber': 'UCp0hYYBW6IMayGgR-WeU6iA',
      'Ed Sheeran': 'UC0C-w0YjGpqDXGB8IHb662A',
      'Katy Perry': 'UC-8Q-hLdECwQmaWNwXitYDw'
    };

    // Base video pool (all have working thumbnails)
    const baseVideos = [
      { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley', views: '1.2B views', uploaded: '2 years ago', duration: '3:33', category: 'music', likes: 52000 },
      { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE', channel: 'officialpsy', views: '4.8B views', uploaded: '10 years ago', duration: '4:12', category: 'music', likes: 98000 },
      { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito', channel: 'Luis Fonsi', views: '8.3B views', uploaded: '5 years ago', duration: '4:41', category: 'music', likes: 120000 },
      { id: 'RgKAFK5djSk', title: 'Wiz Khalifa - See You Again', channel: 'Wiz Khalifa', views: '6.2B views', uploaded: '7 years ago', duration: '3:49', category: 'music', likes: 89000 },
      { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk', channel: 'Mark Ronson', views: '5.1B views', uploaded: '8 years ago', duration: '4:30', category: 'music', likes: 76000 },
      { id: 'e-ORhEE9VVg', title: 'Taylor Swift - Blank Space', channel: 'Taylor Swift', views: '3.9B views', uploaded: '9 years ago', duration: '4:33', category: 'music', likes: 65000 },
      { id: 'YQHsXMglC9A', title: 'Adele - Hello', channel: 'Adele', views: '3.1B views', uploaded: '6 years ago', duration: '6:07', category: 'music', likes: 55000 },
      { id: 'fRh_vgS2dFE', title: 'Justin Bieber - Sorry', channel: 'Justin Bieber', views: '3.7B views', uploaded: '6 years ago', duration: '3:51', category: 'music', likes: 60000 },
      { id: 'JGwWNGJdvx8', title: 'Ed Sheeran - Shape of You', channel: 'Ed Sheeran', views: '6.1B views', uploaded: '5 years ago', duration: '4:24', category: 'music', likes: 102000 },
      { id: 'CevxZvSJLk8', title: 'Katy Perry - Roar', channel: 'Katy Perry', views: '3.8B views', uploaded: '8 years ago', duration: '4:30', category: 'music', likes: 48000 }
    ];

    let allVideos = [...baseVideos];
    let currentFilter = 'all';
    let currentWatchVideo = null;

    // DOM
    const videoGrid = document.getElementById('videoGrid');
    const mainContent = document.getElementById('mainContent');
    const shortsView = document.getElementById('shortsView');
    const shortsContainer = document.getElementById('shortsContainer');
    const watchOverlay = document.getElementById('watchOverlay');
    const youtubePlayer = document.getElementById('youtubePlayer');
    const watchTitle = document.getElementById('watchTitle');
    const watchLikeCount = document.getElementById('watchLikeCount');
    const watchSuggestions = document.getElementById('watchSuggestions');
    const toast = document.getElementById('toast');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Thumbnail URL
    function getThumbnailUrl(videoId) {
      return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    }

    // Channel avatar URL
    function getAvatarUrl(channel) {
      const channelId = channelAvatars[channel];
      return channelId ? `https://i.ytimg.com/i/${channelId}/1.jpg` : null;
    }

    // Render video card with image verification (only shown if image loads)
    function renderVideoCard(video) {
      const avatarUrl = getAvatarUrl(video.channel);
      return `
        <div class="video-card" data-id="${video.id}">
          <div class="thumbnail">
            <img src="${getThumbnailUrl(video.id)}" alt="${video.title}" loading="lazy">
            <span class="duration">${video.duration}</span>
          </div>
          <div class="video-info">
            <div class="channel-avatar">
              ${avatarUrl ? `<img src="${avatarUrl}" alt="${video.channel}">` : `<span>${video.channel[0]}</span>`}
            </div>
            <div class="video-details">
              <div class="video-title">${video.title}</div>
              <div class="channel-name">${video.channel} <i class="fas fa-check-circle"></i></div>
              <div class="video-meta">${video.views} · ${video.uploaded}</div>
            </div>
          </div>
        </div>
      `;
    }

    // Render grid after filtering out videos with broken thumbnails
    function renderGrid(videos) {
      const validVideos = [];
      let loadedCount = 0;
      
      // Show loading while checking images
      videoGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">Loading videos...</div>';
      
      videos.forEach(video => {
        const img = new Image();
        img.onload = () => {
          validVideos.push(video);
          loadedCount++;
          if (loadedCount === videos.length) finishRendering();
        };
        img.onerror = () => {
          loadedCount++;
          if (loadedCount === videos.length) finishRendering();
        };
        img.src = getThumbnailUrl(video.id);
      });

      const finishRendering = () => {
        if (validVideos.length === 0) {
          videoGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">No videos with images found</div>';
          return;
        }
        videoGrid.innerHTML = validVideos.map(v => renderVideoCard(v)).join('');
        attachCardListeners();
      };
    }

    function attachCardListeners() {
      document.querySelectorAll('.video-card').forEach(card => {
        card.addEventListener('click', () => {
          const videoId = card.dataset.id;
          const video = allVideos.find(v => v.id === videoId);
          if (video) openWatch(video);
        });
      });
    }

    function filterAndRender() {
      const filtered = currentFilter === 'all' ? allVideos : allVideos.filter(v => v.category === currentFilter);
      renderGrid(filtered);
    }

    // Open embedded player
    function openWatch(video) {
      currentWatchVideo = video;
      watchOverlay.style.display = 'block';
      youtubePlayer.src = `https://www.youtube.com/embed/${video.id}?autoplay=1`;
      watchTitle.textContent = video.title;
      watchLikeCount.textContent = video.likes > 999 ? (video.likes/1000).toFixed(1)+'K' : video.likes;
      
      // Render suggestions (other videos)
      const otherVideos = allVideos.filter(v => v.id !== video.id).slice(0, 6);
      watchSuggestions.innerHTML = otherVideos.map(v => `
        <div class="video-card" data-id="${v.id}" style="margin-bottom:12px;">
          <div style="display:flex; gap:8px;">
            <img src="${getThumbnailUrl(v.id)}" style="width:120px; height:68px; object-fit:cover; border-radius:8px;">
            <div><div class="video-title" style="font-size:13px;">${v.title}</div><div class="channel-name">${v.channel}</div></div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('#watchSuggestions .video-card').forEach(card => {
        card.addEventListener('click', () => {
          const vid = allVideos.find(v => v.id === card.dataset.id);
          if (vid) openWatch(vid);
        });
      });
    }

    // Close watch overlay
    document.getElementById('closeWatchBtn').addEventListener('click', () => {
      watchOverlay.style.display = 'none';
      youtubePlayer.src = '';
    });

    // Watch actions
    document.getElementById('watchLikeBtn').addEventListener('click', () => {
      if (currentWatchVideo) {
        currentWatchVideo.likes++;
        watchLikeCount.textContent = currentWatchVideo.likes > 999 ? (currentWatchVideo.likes/1000).toFixed(1)+'K' : currentWatchVideo.likes;
        showToast('Liked');
      }
    });
    document.getElementById('watchDislikeBtn').addEventListener('click', () => showToast('Disliked'));
    document.getElementById('watchSaveBtn').addEventListener('click', () => showToast('Saved to Watch Later'));
    document.getElementById('watchShareBtn').addEventListener('click', () => {
      navigator.clipboard?.writeText(`https://youtu.be/${currentWatchVideo?.id || ''}`);
      showToast('Link copied');
    });

    // Chips
    document.querySelectorAll('.chip[data-filter]').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        filterAndRender();
      });
    });

    // Shorts rendering
    function renderShorts() {
      shortsContainer.innerHTML = '';
      baseVideos.slice(0, 5).forEach((video, i) => {
        const div = document.createElement('div');
        div.className = 'short-item';
        div.innerHTML = `
          <div class="short-video-wrapper">
            <div class="short-player">
              <iframe src="https://www.youtube.com/embed/${video.id}?autoplay=0&controls=1&loop=1&playlist=${video.id}" allowfullscreen></iframe>
            </div>
          </div>
          <div class="short-actions">
            <div class="short-action-btn"><i class="far fa-heart"></i><span>${video.likes>999?(video.likes/1000).toFixed(1)+'K':video.likes}</span></div>
            <div class="short-action-btn"><i class="far fa-thumbs-down"></i></div>
            <div class="short-action-btn"><i class="far fa-comment"></i></div>
            <div class="short-action-btn"><i class="fas fa-share"></i></div>
          </div>
          <div class="short-info">
            <div class="short-title">${video.title}</div>
            <div>${video.channel} · Music</div>
          </div>
        `;
        shortsContainer.appendChild(div);
      });
    }

    // Sidebar navigation
    document.querySelectorAll('[data-view]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const view = item.dataset.view;
        
        watchOverlay.style.display = 'none';
        shortsView.classList.remove('active');
        mainContent.style.display = 'none';
        document.querySelector('.chips-wrapper').style.display = 'flex';

        if (view === 'home') {
          mainContent.style.display = 'block';
          filterAndRender();
        } else if (view === 'shorts') {
          shortsView.classList.add('active');
          renderShorts();
        } else {
          mainContent.style.display = 'block';
          videoGrid.innerHTML = '<div style="padding:40px; text-align:center; color:#aaa;">Library empty (demo)</div>';
          document.querySelector('.chips-wrapper').style.display = 'none';
          showToast(`${view} (demo)`);
        }
      });
    });

    // Search
    document.getElementById('searchBtn').addEventListener('click', () => {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const results = allVideos.filter(v => v.title.toLowerCase().includes(query) || v.channel.toLowerCase().includes(query));
      mainContent.style.display = 'block';
      shortsView.classList.remove('active');
      watchOverlay.style.display = 'none';
      renderGrid(results);
      document.querySelector('.chips-wrapper').style.display = 'none';
    });

    document.getElementById('micBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = 'voice demo';
      document.getElementById('searchBtn').click();
    });

    document.getElementById('logoBtn').addEventListener('click', () => {
      watchOverlay.style.display = 'none';
      shortsView.classList.remove('active');
      mainContent.style.display = 'block';
      document.querySelector('.chips-wrapper').style.display = 'flex';
      currentFilter = 'all';
      filterAndRender();
    });

    // Theme toggle
    let themeDark = true;
    document.getElementById('themeToggle').addEventListener('click', function() {
      themeDark = !themeDark;
      document.body.classList.toggle('light-theme', !themeDark);
      this.innerHTML = themeDark ? '<i class="fas fa-moon"></i> Dark theme' : '<i class="fas fa-sun"></i> Light theme';
    });

    document.getElementById('clearDataBtn').addEventListener('click', () => {
      if (confirm('Clear all data?')) localStorage.clear();
    });

    // Infinite scroll (adds more videos with guaranteed images)
    mainContent.addEventListener('scroll', () => {
      if (mainContent.scrollTop + mainContent.clientHeight >= mainContent.scrollHeight - 200 && !loadingIndicator.style.display) {
        loadingIndicator.style.display = 'block';
        setTimeout(() => {
          const newVideos = baseVideos.map(v => ({
            ...v,
            id: v.id + '-' + Date.now() + Math.random(),
            title: v.title + ' (Remastered)',
            views: Math.floor(Math.random()*5000000).toLocaleString() + ' views',
            uploaded: 'Recently'
          }));
          allVideos = [...allVideos, ...newVideos];
          filterAndRender();
          loadingIndicator.style.display = 'none';
        }, 800);
      }
    });

    // Initial render
    filterAndRender();
  })();
</script>
</body>
</html>

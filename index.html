<html lang="en">
<head>
    <meta charset="UTF-8">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 24px;
            background: #0f0f0f;
            border-bottom: 1px solid #303030;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .logo i {
            color: #ff0000;
            font-size: 28px;
        }
        .logo span {
            font-size: 20px;
            font-weight: 600;
            margin-left: 4px;
        }
        .search-container {
            display: flex;
            align-items: center;
            flex: 0 1 600px;
        }
        .search-box {
            display: flex;
            flex: 1;
            height: 40px;
        }
        .search-box input {
            flex: 1;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 0 16px;
            color: #fff;
            outline: none;
        }
        .search-box button {
            background: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            padding: 0 22px;
            cursor: pointer;
            color: #fff;
        }
        .mic-btn {
            background: #272727;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 12px;
            cursor: pointer;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        .icon-btn:hover {
            background: #272727;
        }
        .profile {
            background: #3ea6ff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }
        .app-layout {
            display: flex;
            height: calc(100vh - 56px);
        }
        .sidebar {
            width: 240px;
            background: #0f0f0f;
            padding: 12px 0;
            overflow-y: auto;
            border-right: 1px solid #303030;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            cursor: pointer;
            gap: 24px;
            font-size: 14px;
        }
        .sidebar-item i {
            width: 24px;
        }
        .sidebar-item:hover {
            background: #272727;
        }
        .sidebar-item.active {
            background: #3f3f3f;
        }
        .sidebar-section-title {
            padding: 8px 24px;
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        .chips-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .chip {
            background: #272727;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }
        .chip.active {
            background: #f1f1f1;
            color: #0f0f0f;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 16px;
        }
        .video-card {
            cursor: pointer;
        }
        .thumbnail {
            position: relative;
            aspect-ratio: 16/9;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .video-info {
            display: flex;
            gap: 12px;
        }
        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #3a6ea5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-details {
            flex: 1;
        }
        .video-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-name,
        .video-meta {
            font-size: 13px;
            color: #aaa;
        }
        .watch-overlay {
            position: fixed;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100vh - 56px);
            background: #0f0f0f;
            z-index: 90;
            overflow-y: auto;
            display: none;
        }
        .watch-container {
            display: flex;
            padding: 24px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .watch-primary {
            flex: 2;
            margin-right: 24px;
        }
        .watch-secondary {
            flex: 1;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .close-watch {
            position: absolute;
            top: 16px;
            right: 24px;
            background: #272727;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 95;
        }
        .shorts-view {
            display: none;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .shorts-view.active {
            display: block;
        }
        .short-item {
            height: calc(100vh - 56px);
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }
        .short-video-wrapper {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .short-player {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 12px;
            overflow: hidden;
        }
        .short-player iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .short-actions {
            position: absolute;
            right: 16px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .short-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            cursor: pointer;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        .short-action-btn i {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .short-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
            max-width: 70%;
        }
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 300;
        }
        #toast.show {
            opacity: 1;
        }
        .loader {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .video-card:hover .thumbnail {

            transition: transform 0.2s ease;
        }
        .video-card:hover .video-title {
            color: #fff;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .watch-container {
                flex-direction: column;
            }
            .watch-primary {
                margin-right: 0;
                margin-bottom: 24px;
            }
            .sidebar {
                width: 72px;
            }
            .sidebar-item span {
                display: none;
            }
            .sidebar-item {
                justify-content: center;
                padding: 10px;
                gap: 0;
            }
            .sidebar-section-title {
                display: none;
            }

                { id: 'bo_efYhYU2A', title: 'Maroon 5 - Greatest Hits Mix', channel: 'Maroon 5', views: '67M views', uploaded: '2 years ago', duration: '15:00', category: 'mixes', likes: 19000 },

            ];

            // Deduplicate by ID
            const seenIds = new Set();
            const dedupedBaseVideos = baseVideos.filter(v => {
                if (seenIds.has(v.id)) return false;
                seenIds.add(v.id);
                return true;
            });

            let allVideos = [...dedupedBaseVideos];
            let currentFilter = 'all';
            let currentWatchVideo = null;

            // DOM elements
            const videoGrid = document.getElementById('videoGrid');
            const mainContent = document.getElementById('mainContent');
            const shortsView = document.getElementById('shortsView');
            const shortsContainer = document.getElementById('shortsContainer');
            const watchOverlay = document.getElementById('watchOverlay');
            const youtubePlayer = document.getElementById('youtubePlayer');
            const watchTitle = document.getElementById('watchTitle');
            const watchLikeCount = document.getElementById('watchLikeCount');
            const watchSuggestions = document.getElementById('watchSuggestions');
            const toast = document.getElementById('toast');
            const loadingIndicator = document.getElementById('loadingIndicator');

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // Get thumbnail URL
            function getThumbnailUrl(videoId) {
                return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            }

            // Get channel avatar URL
            function getAvatarUrl(channel) {
                const channelId = channelAvatars[channel];
                return channelId ? `https://i.ytimg.com/i/${channelId}/1.jpg` : null;
            }

            // Render a single video card
            function renderVideoCard(video) {
                const avatarUrl = getAvatarUrl(video.channel);
                return `
                <div class="video-card" data-id="${video.id}">
                    <div class="thumbnail">
                        <img src="${getThumbnailUrl(video.id)}" alt="${video.title}" loading="lazy">
                        <span class="duration">${video.duration}</span>
                    </div>
                    <div class="video-info">
                        <div class="channel-avatar">
                            ${avatarUrl ? `<img src="${avatarUrl}" alt="${video.channel}" onerror="this.parentElement.innerHTML='<span style=font-weight:bold;color:#fff;>${video.channel[0]}</span>';">` : `<span style="font-weight:bold;color:#fff;">${video.channel[0]}</span>`}
                        </div>
                        <div class="video-details">
                            <div class="video-title">${video.title}</div>
                            <div class="channel-name">${video.channel} <i class="fas fa-check-circle"></i></div>
                            <div class="video-meta">${video.views} · ${video.uploaded}</div>
                        </div>
                    </div>
                </div>
                `;
            }

            // Render grid with image preloading – filters out videos with no/broken thumbnails
            function renderGrid(videos) {
                const validVideos = [];
                let loadedCount = 0;
                const totalVideos = videos.length;

                videoGrid.innerHTML =
                    '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;"><i class="fas fa-spinner fa-pulse"></i> Checking thumbnails & loading videos...</div>';

                if (totalVideos === 0) {
                    videoGrid.innerHTML =
                        '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">No videos found for this category</div>';
                    return;
                }

                let rejectedCount = 0;

                videos.forEach(video => {
                    const img = new Image();
                    const thumbnailUrl = getThumbnailUrl(video.id);

                    const timeout = setTimeout(() => {
                        rejectedCount++;
                        loadedCount++;
                        if (loadedCount === totalVideos) finishRendering(rejectedCount);
                    }, 4000);

                    img.onload = function() {
                        clearTimeout(timeout);
                        if (img.naturalWidth < 10 || img.naturalHeight < 10) {
                            rejectedCount++;
                            loadedCount++;
                            if (loadedCount === totalVideos) finishRendering(rejectedCount);
                            return;
                        }
                        validVideos.push(video);
                        loadedCount++;
                        if (loadedCount === totalVideos) finishRendering(rejectedCount);
                    };

                    img.onerror = function() {
                        clearTimeout(timeout);
                        rejectedCount++;
                        loadedCount++;
                        if (loadedCount === totalVideos) finishRendering(rejectedCount);
                    };

                    img.src = thumbnailUrl;
                });

                const finishRendering = (rejected) => {
                    if (validVideos.length === 0) {
                        videoGrid.innerHTML =
                            '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;"><i class="fas fa-exclamation-triangle"></i><br><br>No videos with valid thumbnails found.<br><small>Try a different category or refresh.</small></div>';
                        if (rejected > 0) {
                            showToast(`Filtered out ${rejected} video(s) with no picture`);
                        }
                        return;
                    }
                    videoGrid.innerHTML = validVideos.map(v => renderVideoCard(v)).join('');
                    attachCardListeners();
                    console.log(
                        `✅ Rendered ${validVideos.length} videos with verified thumbnails (${rejected} removed for missing images)`
                    );
                };
            }

            function attachCardListeners() {
                document.querySelectorAll('.video-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const videoId = card.dataset.id;
                        const video = allVideos.find(v => v.id === videoId);
                        if (video) openWatch(video);
                    });
                });
            }

            function filterAndRender() {
                const filtered = currentFilter === 'all' ? allVideos : allVideos.filter(v => v.category === currentFilter);
                renderGrid(filtered);
            }

            // Open embedded player
            function openWatch(video) {
                currentWatchVideo = video;
                watchOverlay.style.display = 'block';
                youtubePlayer.src = `https://www.youtube.com/embed/${video.id}?autoplay=1&rel=0`;
                watchTitle.textContent = video.title;
                watchLikeCount.textContent = video.likes > 999 ? (video.likes / 1000).toFixed(1) + 'K' : video.likes;

                const otherVideos = allVideos.filter(v => v.id !== video.id).slice(0, 8);
                watchSuggestions.innerHTML = otherVideos.map(v => `
                <div class="video-card" data-id="${v.id}" style="margin-bottom:12px;">
                    <div style="display:flex; gap:8px; align-items:flex-start;">
                        <img src="${getThumbnailUrl(v.id)}" style="width:120px; height:68px; object-fit:cover; border-radius:8px; flex-shrink:0;" onerror="this.style.display='none';">
                        <div style="min-width:0;">
                            <div class="video-title" style="font-size:13px;">${v.title}</div>
                            <div class="channel-name" style="font-size:11px;">${v.channel}</div>
                            <div class="video-meta" style="font-size:11px;">${v.views}</div>
                        </div>
                    </div>
                </div>
                `).join('');

                document.querySelectorAll('#watchSuggestions .video-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const vid = allVideos.find(v => v.id === card.dataset.id);
                        if (vid) openWatch(vid);
                    });
                });

                watchOverlay.scrollTop = 0;
            }

            // Close watch overlay
            document.getElementById('closeWatchBtn').addEventListener('click', () => {
                watchOverlay.style.display = 'none';
                youtubePlayer.src = '';
            });

            // Watch action buttons
            document.getElementById('watchLikeBtn').addEventListener('click', () => {
                if (currentWatchVideo) {
                    currentWatchVideo.likes++;
                    watchLikeCount.textContent = currentWatchVideo.likes > 999 ? (currentWatchVideo.likes / 1000).toFixed(1) + 'K' : currentWatchVideo.likes;
                    showToast('Liked');
                }
            });
            document.getElementById('watchDislikeBtn').addEventListener('click', () => showToast('Disliked'));
            document.getElementById('watchSaveBtn').addEventListener('click', () => showToast('Saved to Watch Later'));
            document.getElementById('watchShareBtn').addEventListener('click', () => {
                navigator.clipboard?.writeText(`https://youtu.be/${currentWatchVideo?.id || ''}`);
                showToast('Link copied to clipboard');
            });

            // Chips / filters
            document.querySelectorAll('.chip[data-filter]').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentFilter = chip.dataset.filter;
                    filterAndRender();
                });
            });

            // Shorts rendering
            function renderShorts() {
                shortsContainer.innerHTML = '';
                dedupedBaseVideos.slice(0, 8).forEach((video) => {
                    const div = document.createElement('div');
                    div.className = 'short-item';
                    div.innerHTML = `
                    <div class="short-video-wrapper">
                        <div class="short-player">
                            <iframe src="https://www.youtube.com/embed/${video.id}?autoplay=0&controls=1&loop=1&playlist=${video.id}" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="short-actions">
                        <div class="short-action-btn"><i class="far fa-heart"></i><span>${video.likes>999?(video.likes/1000).toFixed(1)+'K':video.likes}</span></div>
                        <div class="short-action-btn"><i class="far fa-thumbs-down"></i></div>
                        <div class="short-action-btn"><i class="far fa-comment"></i></div>
                        <div class="short-action-btn"><i class="fas fa-share"></i></div>
                    </div>
                    <div class="short-info">
                        <div style="font-weight:500;margin-bottom:4px;">${video.title}</div>
                        <div style="font-size:13px;opacity:0.85;">${video.channel} · ${video.category}</div>
                    </div>
                    `;
                    shortsContainer.appendChild(div);
                });
            }

            // Sidebar navigation
            document.querySelectorAll('[data-view]').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const view = item.dataset.view;

                    watchOverlay.style.display = 'none';
                    shortsView.classList.remove('active');
                    mainContent.style.display = 'none';
                    document.querySelector('.chips-wrapper').style.display = 'flex';

                    if (view === 'home') {
                        mainContent.style.display = 'block';
                        filterAndRender();
                    } else if (view === 'shorts') {
                        shortsView.classList.add('active');
                        renderShorts();
                    } else {
                        mainContent.style.display = 'block';
                        videoGrid.innerHTML =
                            '<div style="padding:40px; text-align:center; color:#aaa;"><i class="fas fa-folder-open"></i><br><br>Library empty (demo mode)</div>';
                        document.querySelector('.chips-wrapper').style.display = 'none';
                        showToast(`${view.charAt(0).toUpperCase() + view.slice(1)} (demo)`);
                    }
                });
            });

            // Search
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchInput').value.toLowerCase().trim();
                if (!query) {
                    filterAndRender();
                    return;
                }
                const results = allVideos.filter(v =>
                    v.title.toLowerCase().includes(query) || v.channel.toLowerCase().includes(query)
                );
                mainContent.style.display = 'block';
                shortsView.classList.remove('active');
                watchOverlay.style.display = 'none';
                renderGrid(results);
                document.querySelector('.chips-wrapper').style.display = 'none';
                showToast(`Found ${results.length} video${results.length !== 1 ? 's' : ''}`);
            });

            document.getElementById('micBtn').addEventListener('click', () => {
                document.getElementById('searchInput').value = 'voice search demo';
                document.getElementById('searchBtn').click();
            });

            document.getElementById('logoBtn').addEventListener('click', () => {
                watchOverlay.style.display = 'none';
                shortsView.classList.remove('active');
                mainContent.style.display = 'block';
                document.querySelector('.chips-wrapper').style.display = 'flex';
                document.getElementById('searchInput').value = '';
                currentFilter = 'all';
                document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
                document.querySelector('.chip[data-filter="all"]')?.classList.add('active');
                filterAndRender();
            });

            // Theme toggle
            let themeDark = true;
            document.getElementById('themeToggle').addEventListener('click', function() {
                themeDark = !themeDark;
                if (!themeDark) {
                    document.body.style.background = '#f9f9f9';
                    document.body.style.color = '#0f0f0f';
                } else {
                    document.body.style.background = '#0f0f0f';
                    document.body.style.color = '#f1f1f1';
                }
                this.innerHTML = themeDark ? '<i class="fas fa-moon"></i><span> Dark theme</span>' :
                    '<i class="fas fa-sun"></i><span> Light theme</span>';
                showToast(themeDark ? 'Dark theme' : 'Light theme (partial)');
            });

            document.getElementById('clearDataBtn').addEventListener('click', () => {
                if (confirm('Clear all data and reset?')) {
                    localStorage.clear();
                    showToast('Data cleared');
                }
            });

            // Infinite scroll — adds more videos with slight variations (uses deduped list)
            mainContent.addEventListener('scroll', () => {
                if (mainContent.scrollTop + mainContent.clientHeight >= mainContent.scrollHeight - 300 && !loadingIndicator.style.display) {
                    loadingIndicator.style.display = 'block';
                    setTimeout(() => {
                        const newVideos = dedupedBaseVideos.slice(0, 20).map(v => ({
                            ...v,
                            id: v.id + '-r' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                            title: v.title + ' (Remastered)',
                            views: Math.floor(Math.random() * 5000000).toLocaleString() + ' views',
                            uploaded: 'Recently',
                            likes: Math.floor(v.likes * (0.6 + Math.random() * 0.8))
                        }));
                        allVideos = [...allVideos, ...newVideos];
                        filterAndRender();
                        loadingIndicator.style.display = 'none';
                    }, 800);
                }
            });

            // Initial render
            console.log(`🎬 Starting with ${dedupedBaseVideos.length} unique videos (Coldplay, Adele, Eagles, Pink Floyd, Mortal Kombat, Dude Perfect, National Geographic removed)`);
            filterAndRender();
        })();
